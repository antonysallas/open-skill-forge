name: Test Setup Scripts

on:
  push:
    paths:
      - "python/setup/**"
      - ".github/workflows/test-setup-scripts.yml"
  pull_request:
    paths:
      - "python/setup/**"
      - ".github/workflows/test-setup-scripts.yml"
  workflow_dispatch: # allow manual trigger

env:
  REPO_DIR_LINUX: ~/projects/open-skill-forge
  VENV_DIR_LINUX: ~/projects/open-skill-forge/.venv

jobs:
  test-setup-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup
        run: bash python/setup/setup.sh

      - name: Verify tools are available
        run: |
          uv --version
          ${{ env.VENV_DIR_LINUX }}/bin/python --version
          ${{ env.VENV_DIR_LINUX }}/bin/jupyter-lab --version

      - name: Run removal
        run: |
          bash python/setup/remove.sh --force

      - name: Verify tools are removed
        run: |
          ! command -v uv 2>/dev/null
          test ! -d ${{ env.VENV_DIR_LINUX }}

  test-setup-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup
        run: bash python/setup/setup.sh

      - name: Verify tools are available
        run: |
          uv --version
          ${{ env.VENV_DIR_LINUX }}/bin/python --version
          ${{ env.VENV_DIR_LINUX }}/bin/jupyter-lab --version

      - name: Run removal
        run: |
          bash python/setup/remove.sh --force

      - name: Verify tools are removed
        run: |
          ! command -v uv 2>/dev/null
          test ! -d ${{ env.VENV_DIR_LINUX }}

  test-setup-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup
        shell: pwsh
        run: python/setup/setup.ps1

      - name: Verify tools are available
        shell: pwsh
        run: |
          uv --version
          $venv = "$env:USERPROFILE\projects\open-skill-forge\.venv"
          & "$venv\Scripts\python.exe" --version
          & "$venv\Scripts\jupyter-lab.exe" --version

      - name: Run removal
        shell: pwsh
        run: |
          python/setup/remove.ps1 -Force

      - name: Verify tools are removed
        shell: pwsh
        run: |
          $localBin = "$env:USERPROFILE\.local\bin"
          $venv = "$env:USERPROFILE\projects\open-skill-forge\.venv"
          if (Test-Path $localBin) { Write-Host ".local/bin still exists"; exit 1 }
          if (Test-Path $venv) { Write-Host ".venv still exists"; exit 1 }
          Write-Host "Tools successfully removed"

  test-idempotent-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup twice
        run: |
          bash python/setup/setup.sh
          bash python/setup/setup.sh

      - name: Verify tools still work
        run: |
          uv --version
          ${{ env.VENV_DIR_LINUX }}/bin/jupyter-lab --version

  test-idempotent-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup twice
        shell: pwsh
        run: |
          & python/setup/setup.ps1
          & python/setup/setup.ps1

      - name: Verify tools still work
        shell: pwsh
        run: |
          uv --version
          $venv = "$env:USERPROFILE\projects\open-skill-forge\.venv"
          & "$venv\Scripts\jupyter-lab.exe" --version
